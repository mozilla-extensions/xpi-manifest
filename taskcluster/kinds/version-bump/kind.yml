---
loader: xpi_taskgraph.loader.single_dep:loader

transforms:
    - xpi_taskgraph.transforms.version_bump:transforms
    - taskgraph.transforms.task:transforms

kind-dependencies:
    - beetmover

only-for-addon-types: ["system"]

task-template:
    run-on-tasks-for: ["action"]
    worker-type: lando
    lando-repo:
        by-level:
            "3": firefox-main
            default: staging-firefox-main
    attributes:
        shipping-phase: ship
