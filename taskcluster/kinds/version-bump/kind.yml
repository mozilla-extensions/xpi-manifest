---
loader: taskgraph.loader.transform:loader

transforms:
    - taskgraph.transforms.from_deps
    - xpi_taskgraph.transforms.version_bump:transforms
    - taskgraph.transforms.task:transforms

kind-dependencies:
    - beetmover

tasks:
    version-bump:
        from-deps:
            with-attributes: {addon-type: [system]}
            copy-attributes: true
        run-on-tasks-for: ["action"]
        worker-type: lando
        lando-repo:
            by-level:
                "3": firefox-main
                default: staging-firefox-main
        attributes:
            shipping-phase: ship
